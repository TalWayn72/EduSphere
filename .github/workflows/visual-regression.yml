name: Visual Regression

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  visual-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: edusphere_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @edusphere/web exec playwright install --with-deps chromium

      - name: Build web app
        run: pnpm --filter @edusphere/web build
        env:
          VITE_GRAPHQL_URL: http://localhost:4000/graphql
          VITE_GRAPHQL_WS_URL: ws://localhost:4000/graphql
          VITE_KEYCLOAK_URL: http://localhost:8080
          VITE_KEYCLOAK_REALM: edusphere
          VITE_KEYCLOAK_CLIENT_ID: edusphere-web

      - name: Run visual E2E tests
        run: pnpm --filter @edusphere/web test:e2e -- --project=chromium
        env:
          ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}
          VITE_GRAPHQL_URL: http://localhost:4000/graphql

      - name: Upload Argos screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-screenshots
          path: apps/web/visual-qa-results/
          retention-days: 30
