type SocialRecommendation {
  contentItemId: ID!
  contentTitle: String!
  followersCount: Int!
  isMutualFollower: Boolean!
  lastActivity: String!
}

enum SocialVerb {
  COMPLETED
  ENROLLED
  ACHIEVED_BADGE
  DISCUSSED
  STARTED_LEARNING
}

type SocialFeedItem {
  userId: ID!
  userDisplayName: String!
  verb: SocialVerb
  action: String!
  contentItemId: ID!
  contentTitle: String!
  timestamp: String!
}

extend type Query {
  socialRecommendations(limit: Int): [SocialRecommendation!]! @authenticated
  socialFeed(limit: Int): [SocialFeedItem!]! @authenticated
}
