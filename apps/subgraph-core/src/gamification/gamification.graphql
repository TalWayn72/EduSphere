extend schema
  @link(url: "https://specs.apollo.dev/federation/v2.7", import: ["@key", "@shareable", "@authenticated"])

type Badge {
  id: ID!
  name: String!
  description: String!
  iconEmoji: String!
  category: String!
  pointsReward: Int!
  conditionType: String!
  conditionValue: Int!
}

type UserBadge {
  id: ID!
  badge: Badge!
  earnedAt: DateTime!
}

type LeaderboardEntry {
  rank: Int!
  userId: ID!
  displayName: String!
  totalPoints: Int!
  badgeCount: Int!
}

input CreateBadgeInput {
  name: String!
  description: String!
  iconEmoji: String!
  category: String!
  pointsReward: Int!
  conditionType: String!
  conditionValue: Int!
}

input UpdateBadgeInput {
  name: String
  description: String
  iconEmoji: String
  category: String
  pointsReward: Int
  conditionType: String
  conditionValue: Int
}

type OpenBadgeDefinition @key(fields: "id") {
  id: ID!
}

type OpenBadge {
  id: ID!
  badgeDefinitionId: ID!
  recipientId: ID!
  tenantId: ID!
  issuedAt: String!
  expiresAt: String
  evidenceUrl: String
  proof: JSON!
  revoked: Boolean!
  revokedAt: String
  revokedReason: String
  definition: OpenBadgeDefinition!
  vcDocument: String!
}

type GamificationStats {
  currentStreak: Int!
  longestStreak: Int!
  activeChallenges: [UserChallenge!]!
  leaderboard: [XpLeaderboardEntry!]!
}

type UserChallenge {
  challengeId: ID!
  title: String!
  description: String!
  targetValue: Int!
  currentValue: Int!
  xpReward: Int!
  completed: Boolean!
  endDate: DateTime!
}

type XpLeaderboardEntry {
  rank: Int!
  userId: ID!
  displayName: String!
  totalXp: Int!
  level: Int!
}

extend type Query {
  myBadges: [UserBadge!]! @authenticated
  leaderboard(limit: Int): [LeaderboardEntry!]! @authenticated
  myRank: Int! @authenticated
  myTotalPoints: Int! @authenticated
  adminBadges: [Badge!]!
    @authenticated
    @requiresRole(roles: [ORG_ADMIN, SUPER_ADMIN])
  myOpenBadges: [OpenBadge!]! @authenticated
  verifyOpenBadge(assertionId: ID!): Boolean! @authenticated
  myGamificationStats: GamificationStats! @authenticated
  tenantLeaderboard(limit: Int): [XpLeaderboardEntry!]! @authenticated
}

extend type Mutation {
  createBadge(input: CreateBadgeInput!): Badge!
    @authenticated
    @requiresRole(roles: [ORG_ADMIN, SUPER_ADMIN])

  updateBadge(id: ID!, input: UpdateBadgeInput!): Badge!
    @authenticated
    @requiresRole(roles: [ORG_ADMIN, SUPER_ADMIN])

  deleteBadge(id: ID!): Boolean!
    @authenticated
    @requiresRole(roles: [ORG_ADMIN, SUPER_ADMIN])

  issueBadge(
    badgeDefinitionId: ID!
    recipientId: ID!
    evidenceUrl: String
  ): OpenBadge! @authenticated

  revokeOpenBadge(assertionId: ID!, reason: String!): Boolean!
    @authenticated
    @requiresRole(roles: [ORG_ADMIN, SUPER_ADMIN])
}
