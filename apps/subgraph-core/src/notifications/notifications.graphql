scalar JSON

type Notification {
  id: ID!
  userId: ID!
  type: NotificationType!
  title: String!
  body: String!
  payload: JSON
  readAt: DateTime
  createdAt: DateTime!
}

enum NotificationType {
  BADGE_ISSUED
  COURSE_ENROLLED
  USER_FOLLOWED
  SRS_REVIEW_DUE
  ANNOUNCEMENT
  LESSON_AVAILABLE
  SESSION_STARTING
  STREAK_REMINDER
  AT_RISK_ALERT
}

extend type Subscription {
  notificationReceived(userId: ID!): Notification! @authenticated
}

# ─── Phase 35: Push Token Registration ───────────────────────────────────────

enum PushPlatform {
  WEB
  IOS
  ANDROID
}

type PushRegistration {
  id: ID!
  platform: PushPlatform!
  createdAt: String!
}

extend type Mutation {
  registerPushToken(
    platform: PushPlatform!
    expoPushToken: String
    webPushSubscription: String
  ): PushRegistration! @authenticated

  unregisterPushToken(platform: PushPlatform!): Boolean! @authenticated
}
