extend schema
  @link(url: "https://specs.apollo.dev/federation/v2.7", import: ["@key", "@shareable", "@authenticated", "@requiresScopes"])

type AdminOverview {
  totalUsers: Int!
  activeUsersThisMonth: Int!
  totalCourses: Int!
  completionsThisMonth: Int!
  atRiskCount: Int!
  lastScimSync: String
  lastComplianceReport: String
  storageUsedMb: Float!
}

# AdminDashboardStats is an alias for AdminOverview exposed for Phase 1 wiring.
type AdminDashboardStats {
  totalUsers: Int!
  activeUsers: Int!
  totalCourses: Int!
  publishedCourses: Int!
  totalAnnotations: Int!
  storageUsedMb: Float!
}

type AtRiskThresholds {
  inactivityDays: Int!
  minCompletionPct: Float!
  minQuizScorePct: Float!
}

input AtRiskThresholdsInput {
  inactivityDays: Int!
  minCompletionPct: Float!
  minQuizScorePct: Float!
}

type Query {
  adminOverview: AdminOverview!
    @authenticated
    @requiresRole(roles: [ORG_ADMIN, SUPER_ADMIN])

  adminDashboardStats: AdminDashboardStats!
    @authenticated
    @requiresRole(roles: [ORG_ADMIN, SUPER_ADMIN])

  atRiskThresholds: AtRiskThresholds!
    @authenticated
    @requiresRole(roles: [ORG_ADMIN, SUPER_ADMIN])
}

extend type Mutation {
  saveAtRiskThresholds(input: AtRiskThresholdsInput!): AtRiskThresholds!
    @authenticated
    @requiresRole(roles: [ORG_ADMIN, SUPER_ADMIN])
}
