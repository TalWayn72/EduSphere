type PageInfo @shareable {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

type CourseListing {
  id: ID!
  courseId: ID!
  title: String!
  description: String
  instructorName: String!
  thumbnailUrl: String
  price: Float
  currency: String
  tags: [String!]!
  enrollmentCount: Int!
  rating: Float
  totalLessons: Int!
  priceCents: Int!
  isPublished: Boolean!
  revenueSplitPercent: Int!
}

type CourseListingEdge {
  node: CourseListing!
  cursor: String!
}

type CourseListingConnection {
  edges: [CourseListingEdge!]!
  nodes: [CourseListing!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

input CourseListingFiltersInput {
  tags: [String!]
  priceMax: Float
  instructorName: String
  search: String
}

type MarketplacePurchase {
  id: ID!
  courseId: ID!
  amountCents: Int!
  status: String!
  purchasedAt: String!
}

type EarningsSummary {
  totalEarnedCents: Int!
  pendingPayoutCents: Int!
  paidOutCents: Int!
  purchases: [MarketplacePurchase!]!
}

type PaymentIntentResult {
  clientSecret: String!
  paymentIntentId: String!
}

type InstructorPayout {
  id: ID!
  periodMonth: String!
  grossRevenue: Int!
  platformCut: Int!
  instructorPayout: Int!
  status: String!
  paidAt: String
}

extend type Query {
  courseListings(
    tenantId: ID!
    limit: Int
    offset: Int
    filters: CourseListingFiltersInput
  ): CourseListingConnection! @authenticated
  myPurchases: [MarketplacePurchase!]! @authenticated
  instructorEarnings: EarningsSummary! @authenticated @requiresRole(roles: [INSTRUCTOR, ORG_ADMIN])
  myPayouts: [InstructorPayout!]! @authenticated
  allPayouts(month: String): [InstructorPayout!]! @authenticated @requiresRole(roles: [SUPER_ADMIN, ORG_ADMIN])
}

extend type Mutation {
  createCourseListing(
    courseId: ID!
    priceCents: Int!
    currency: String!
    revenueSplitPercent: Int
  ): CourseListing! @authenticated @requiresRole(roles: [INSTRUCTOR, ORG_ADMIN])

  publishListing(courseId: ID!): Boolean! @authenticated @requiresRole(roles: [INSTRUCTOR, ORG_ADMIN])

  purchaseCourse(courseId: ID!): PaymentIntentResult! @authenticated

  requestPayout: Boolean! @authenticated @requiresRole(roles: [INSTRUCTOR, ORG_ADMIN])
}
