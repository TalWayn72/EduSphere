extend type Mutation {
  importFromYoutube(input: YoutubeImportInput!): ImportJob! @authenticated @requiresRole(roles: [INSTRUCTOR, ORG_ADMIN, SUPER_ADMIN])
  importFromWebsite(input: WebsiteImportInput!): ImportJob! @authenticated @requiresRole(roles: [INSTRUCTOR, ORG_ADMIN, SUPER_ADMIN])
  importFromDrive(input: DriveImportInput!): ImportJob!
    @authenticated
    @requiresRole(roles: [INSTRUCTOR, ORG_ADMIN, SUPER_ADMIN])
  cancelImport(jobId: ID!): Boolean! @authenticated
}

type ImportJob {
  id: ID!
  status: ImportStatus!
  lessonCount: Int!
  estimatedMinutes: Int
}

enum ImportStatus {
  PENDING
  RUNNING
  COMPLETE
  FAILED
  CANCELLED
}

input YoutubeImportInput {
  playlistUrl: String!
  courseId: ID!
  moduleId: ID!
}

input WebsiteImportInput {
  siteUrl: String!
  courseId: ID!
  moduleId: ID!
}

input DriveImportInput {
  folderId:    String!
  courseId:    ID!
  moduleId:    ID!
  accessToken: String!
}
