type ContentItemMetric {
  contentItemId: ID!
  title: String!
  viewCount: Int!
  avgTimeSpentSeconds: Int!
  completionRate: Float!
}

type FunnelStep {
  moduleId: ID!
  moduleName: String!
  learnersStarted: Int!
  learnersCompleted: Int!
  dropOffRate: Float!
}

type CourseAnalytics {
  courseId: ID!
  enrollmentCount: Int!
  activeLearnersLast7Days: Int!
  completionRate: Float!
  avgQuizScore: Float
  contentItemMetrics: [ContentItemMetric!]!
  dropOffFunnel: [FunnelStep!]!
}

extend type Query {
  courseAnalytics(courseId: ID!): CourseAnalytics! @authenticated
}

# ─── Phase 35: Tenant Analytics & Reporting ───────────────────────────────────

enum AnalyticsPeriod {
  SEVEN_DAYS
  THIRTY_DAYS
  NINETY_DAYS
}

enum ExportFormat {
  CSV
  EXCEL
}

type TrendPoint {
  date: String!
  value: Float!
}

type CourseCompletionMetric {
  courseId: ID!
  courseTitle: String!
  enrollmentCount: Int!
  completionRate: Float!
  avgTimeToCompleteHours: Float
}

type TenantAnalytics {
  activeLearnersTrend: [TrendPoint!]!
  completionRateTrend: [TrendPoint!]!
  totalEnrollments: Int!
  avgLearningVelocity: Float!
  topCourses: [CourseCompletionMetric!]!
}

type LearnerVelocityRow {
  userId: ID!
  displayName: String!
  lessonsPerWeek: Float!
  weeklyTrend: [TrendPoint!]!
}

type CohortMetrics {
  cohortWeek: String!
  enrolled: Int!
  activeAt7Days: Int!
  activeAt30Days: Int!
  completionRate30Days: Float!
}

extend type Query {
  tenantAnalytics(period: AnalyticsPeriod!): TenantAnalytics!
    @authenticated

  learnerVelocity(period: AnalyticsPeriod!, limit: Int = 20): [LearnerVelocityRow!]!
    @authenticated

  cohortRetention(weeksBack: Int = 12): [CohortMetrics!]!
    @authenticated

  exportTenantAnalytics(period: AnalyticsPeriod!, format: ExportFormat!): String!
    @authenticated
    @requiresRole(roles: [ORG_ADMIN, SUPER_ADMIN])
}

# ─── Phase 36: At-Risk Learner Query ──────────────────────────────────────────

type AtRiskLearner {
  userId: ID!
  displayName: String!
  courseId: ID!
  courseTitle: String!
  daysSinceActive: Int!
  progressPct: Int!
}

extend type Query {
  listAtRiskLearners(threshold: Int): [AtRiskLearner!]!
    @authenticated
    @requiresRole(roles: [ORG_ADMIN, SUPER_ADMIN])
}
