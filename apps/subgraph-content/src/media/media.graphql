type PresignedUploadUrl {
  uploadUrl: String!
  fileKey: String!
  expiresAt: String!
}

"""
An available subtitle track for a media asset.
"""
type SubtitleTrack {
  """ BCP-47 language code, e.g. "he", "fr", "de". """
  language: String!
  """ Human-readable label for display in the player UI. """
  label: String!
  """ Presigned URL of the WebVTT subtitle file (valid for 15 minutes). """
  src: String!
}

type MediaAsset {
  id: ID!
  courseId: ID!
  fileKey: String!
  title: String!
  contentType: String!
  status: MediaStatus!
  downloadUrl: String
  """
  Presigned URL for the HLS master manifest (.m3u8).
  Null until HLS transcoding completes (non-blocking background step).
  Valid for 1 hour after generation.
  """
  hlsManifestUrl: String
  captionsUrl: String
  altText: String
  """
  Available subtitle tracks for this media asset.
  Populated after AI subtitle translation completes for one or more target languages.
  """
  subtitleTracks: [SubtitleTrack!]!
}

enum MediaStatus {
  UPLOADING
  PROCESSING
  READY
  ERROR
}

extend type Query {
  getPresignedUploadUrl(
    fileName: String!
    contentType: String!
    courseId: ID!
  ): PresignedUploadUrl! @authenticated
}

extend type Mutation {
  confirmMediaUpload(
    fileKey: String!
    courseId: ID!
    title: String!
  ): MediaAsset! @authenticated

  updateMediaAltText(mediaId: ID!, altText: String!): MediaAsset! @authenticated
}
