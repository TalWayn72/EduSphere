    <script>
      // Prevent Flash of Unstyled Content — apply theme + locale direction before React hydrates
      (function() {
        try {
          var prefs = JSON.parse(localStorage.getItem('edusphere-user-prefs') || '{}');
          var mode = prefs.mode || 'system';
          var resolved = mode === 'system'
            ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
            : mode;
          document.documentElement.classList.toggle('dark', resolved === 'dark');
          document.documentElement.setAttribute('data-theme', resolved);
        } catch(e) {}
        try {
          var locale = localStorage.getItem('edusphere_locale');
          if (locale) {
            var rtlLocales = ['he', 'ar'];
            document.documentElement.setAttribute('dir', rtlLocales.indexOf(locale) !== -1 ? 'rtl' : 'ltr');
            document.documentElement.setAttribute('lang', locale);
          }
        } catch(e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
