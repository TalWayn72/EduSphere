    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "EduSphere",
      "url": "https://edusphere.dev",
      "description": "AI-powered knowledge graph learning platform for universities and enterprises.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {"@type": "EntryPoint", "urlTemplate": "https://edusphere.dev/search?q={search_term_string}"},
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- FOUC Prevention — apply theme + locale direction before React hydrates -->
    <script>
      (function() {
        try {
          var prefs = JSON.parse(localStorage.getItem('edusphere-user-prefs') || '{}');
          var mode = prefs.mode || 'system';
          var resolved = mode === 'system'
            ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
            : mode;
          document.documentElement.classList.toggle('dark', resolved === 'dark');
          document.documentElement.setAttribute('data-theme', resolved);
        } catch(e) {}
        try {
          var locale = localStorage.getItem('edusphere_locale');
          if (locale) {
            var rtlLocales = ['he', 'ar'];
            document.documentElement.setAttribute('dir', rtlLocales.indexOf(locale) !== -1 ? 'rtl' : 'ltr');
            document.documentElement.setAttribute('lang', locale);
          }
        } catch(e) {}
      })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
