# EduSphere GPU Override — All-in-One Container
#
# Requires NVIDIA Container Toolkit installed on the Docker host:
#   https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
#
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
#
# This file ONLY works when layered on top of docker-compose.yml.
# The base docker-compose.yml is CPU-only and always works without GPU.

services:
  edusphere:
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    mem_limit: 16g
    mem_reservation: 8g
    environment:
      # NVIDIA Container Toolkit — expose all GPUs
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      # GPU detection results (overrides detect-gpu.sh defaults)
      GPU_AVAILABLE: "true"
      GPU_VENDOR: nvidia
      # Leave OLLAMA_NUM_GPU empty so Ollama auto-detects optimal layer count
      OLLAMA_NUM_GPU: ""
      # Whisper GPU settings
      WHISPER_DEVICE: cuda
      WHISPER_COMPUTE_TYPE: float16
      WHISPER_MODEL_SIZE: large-v3
      # Increase Node.js heap for GPU-assisted inference workloads
      NODE_OPTIONS: "--max-old-space-size=8192"
