# Linkerd ServerAuthorization policies for EduSphere subgraphs.
# Enforces mTLS-only communication and restricts which services may
# call each subgraph inbound. Plaintext traffic is rejected by default
# when these policies are active.
#
# Apply with: kubectl apply -f server-policies.yaml -n edusphere
# Verify with: linkerd viz edges -n edusphere

---
# ─── subgraph-core (port 4001) ───────────────────────────────────────────────
# Only the gateway is permitted to call subgraph-core inbound.
apiVersion: policy.linkerd.io/v1beta2
kind: Server
metadata:
  name: subgraph-core
  namespace: edusphere
  labels:
    app: subgraph-core
spec:
  podSelector:
    matchLabels:
      app: subgraph-core
  port: 4001
  proxyProtocol: HTTP/2
---
apiVersion: policy.linkerd.io/v1beta2
kind: ServerAuthorization
metadata:
  name: subgraph-core-allow-gateway
  namespace: edusphere
spec:
  server:
    name: subgraph-core
  client:
    meshTLS:
      serviceAccounts:
        - name: edusphere-gateway
          namespace: edusphere

---
